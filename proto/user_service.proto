syntax = 'proto3';  

package auth; 

option go_package = "github.com/junaidmdv/goalcirlcle/user_service/proto/pb"; 


message RegisterRequest { 
    string full_name=1;   
    string email =2;  
    string phone_num=3;
    string password=4; 
    string confirm_password=5;
}   


message RegisterResponse{
  string user_id=1; 
  string email=2;  
  string phone_num=3;
  optional bool otp_status=4; 
} 

// authentication of users services
service AuthService{
  //registeration of user account
  rpc Register(RegisterRequest)returns(RegisterResponse);   
  
}