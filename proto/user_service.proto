syntax = 'proto3';  

package auth; 

option go_package = "github.com/junaidmdv/goalcirlcle/user_service/proto/pb"; 


message RegisterRequest { 
    string full_name=1;   
    string email =2; 
    string password=3; 
    string confirm_password=4;
}   


message RegisterResponse{
  string session_id=1; 
  string email=2; 
  optional bool otp_status=3; 
} 

// authentication of users services
service AuthService{
  //registeration of user account
  rpc Register(RegisterRequest)returns(RegisterResponse);   
  
}