syntax = 'proto3';  

package auth; 

option go_package = "github.com/junaidmdv/goalcirlcle/user_service/proto/pb";  
import "google/protobuf/timestamp.proto";


message RegisterRequest { 
    string full_name=1;   
    string email =2;  
    string phone_num=3;
    string password=4; 
    string confirm_password=5;
}   


message RegisterResponse{
  string email=2;  
  string phone_num=3;
  optional bool otp_status=4; 
  google.protobuf.Timestamp otp_expires_at=5;
} 

message OtpReq {
   string email=1;  
   string phone_num=2;
   string otp=3;

} 

message OtpRes{  
   string user_id=1;
   string access_token=2; 
   google.protobuf.Timestamp access_token_expiry=3;
} 


message LoginRequest{
   string email=1; 
   string password=2;
} 


message LoginResponse{
   string user_id=1; 
   string access_token=2; 
   string access_token_expiry=3;
} 


message ResendOtpReq{
   string email=1; 
   string phone_num=2; 
} 

message ResendOtpRes{
   bool success=1; 
   google.protobuf.Timestamp otp_expiry=2;
}




// authentication of users services
service AuthService{
  //registeration of user account
  rpc Register(RegisterRequest)returns(RegisterResponse);     
  //verfiy otp 
  rpc VerfiyOtp(OtpReq)returns(OtpRes);   
  //user login
  rpc Login(LoginRequest)returns(LoginResponse); 
  //resend otp 
  rpc ResendOtp(ResendOtpReq) returns(ResendOtpRes);
  

}


